<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nastavení BetTracker</title>
  <style>
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      padding: 20px;
      max-width: 480px;
      margin: 0 auto;
    }
    h1 { font-size: 1.25rem; color: #334155; margin-bottom: 1rem; }
    .option { margin-bottom: 1rem; }
    .option label { display: block; font-weight: 600; color: #475569; margin-bottom: 0.5rem; }
    select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 14px;
    }
    .hint { font-size: 12px; color: #64748b; margin-top: 0.25rem; }
  </style>
</head>
<body>
  <h1>Nastavení BetTracker</h1>
  <div class="option">
    <label for="api-url">URL API (backend)</label>
    <input type="text" id="api-url" placeholder="http://127.0.0.1:15555/api" style="width:100%;padding:8px 12px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px;box-sizing:border-box;" />
    <p class="hint">Backend musí běžet na portu 15555 (BetTracker.bat nebo run-backend.bat). Zadejte přesně: <strong>http://127.0.0.1:15555/api</strong> nebo <strong>http://localhost:15555/api</strong>. Rozšíření při chybě zkusí druhou adresu automaticky.</p>
  </div>
  <div class="option">
    <label for="upcoming-visibility">Tlačítko Upcoming zobrazit</label>
    <select id="upcoming-visibility">
      <option value="tipsport_betano_only">Jen na Tipsport a Betano</option>
      <option value="everywhere">Na všech webech</option>
    </select>
    <p class="hint">Upcoming zobrazuje budoucí nevyhodnocené události (0–6 h).</p>
  </div>
  <script src="options.js"></script>
</body>
</html>
