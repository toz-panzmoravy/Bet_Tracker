<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BetTracker Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-brand" data-tauri-drag-region>
        <span class="logo-mark">B</span>
        <h1 class="title">BetTracker</h1>
      </div>
      <div class="header-actions">
        <button type="button" id="alwaysOnTop" class="btn-icon btn-pin" title="Připnout navrch" aria-label="Připnout navrch">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="3"/><path d="M12 8v13"/><path d="M9 21h6"/></svg>
        </button>
        <button type="button" id="btnExpand" class="btn-icon" title="Roztáhnout k pravému okraji" aria-label="Maximalizovat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 12h16"/><path d="M12 4v16"/></svg>
        </button>
        <button type="button" id="btnRefresh" class="btn-icon" title="Obnovit" aria-label="Obnovit">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
        <button type="button" id="btnSettings" class="btn-icon" title="Nastavení" aria-label="Nastavení">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>
    <div class="filter-bar">
      <div class="filter-chips">
        <label class="filter-chip" data-bookmaker="tipsport" title="Tipsport"><input type="checkbox" id="filterTipsport" checked /><span>T</span></label>
        <label class="filter-chip" data-bookmaker="betano" title="Betano"><input type="checkbox" id="filterBetano" checked /><span>B</span></label>
        <label class="filter-chip" data-bookmaker="fortuna" title="Fortuna"><input type="checkbox" id="filterFortuna" checked /><span>F</span></label>
      </div>
    </div>
    <div id="error" class="error" hidden></div>
    <main class="content">
      <div class="column-active">
        <section id="sectionLive" class="section">
          <h2 class="section-title">Právě hraje</h2>
          <ul id="listLive" class="ticket-list"></ul>
        </section>
      </div>
      <div class="column-upcoming">
        <section id="sectionUpcoming" class="section">
          <h2 class="section-title">Vsazené – zápas nezačal</h2>
          <ul id="listUpcoming" class="ticket-list"></ul>
        </section>
      </div>
    </main>
    <div id="loading" class="loading" hidden>
      <p id="loadingMessage" class="loading-message">Aktualizuji…</p>
      <div class="loading-bar-wrap"><div class="loading-bar" aria-hidden="true"></div></div>
      <p class="loading-hint">Aktualizuji tikety…</p>
    </div>
    <p id="dataHint" class="data-hint" hidden></p>
    <p id="lastRefresh" class="last-refresh" hidden></p>
  </div>
  <div id="settingsModal" class="modal" hidden>
    <div id="settingsModalBackdrop" class="modal-backdrop" title="Kliknutím zavřete"></div>
    <div class="modal-content" id="settingsModalContent">
      <div class="modal-header-row">
        <h3>Nastavení</h3>
        <button type="button" id="btnModalCloseX" class="modal-close-x" title="Zavřít (Esc)" aria-label="Zavřít">×</button>
      </div>
      <label>URL API (backend): <input type="text" id="apiUrl" value="http://127.0.0.1:15555/api" placeholder="http://127.0.0.1:15555/api" /></label>
      <label>Interval obnovení (s): <input type="number" id="refreshInterval" min="30" max="300" value="60" /></label>
      <label>Zobrazit zápasy X h dopředu: <input type="number" id="upcomingHours" min="1" max="168" value="24" /></label>
      <label class="slider-label">Průhlednost okna: <span id="opacityValue">100</span>%</label>
      <input type="range" id="opacitySlider" min="40" max="100" value="100" class="opacity-slider" />
      <p class="modal-hint">Zavřít: <kbd>Esc</kbd></p>
      <div class="modal-actions">
        <button type="button" id="btnSaveSettings">Uložit</button>
        <button type="button" id="btnCloseSettings">Zavřít</button>
      </div>
    </div>
  </div>
  <script type="module" src="/main.js"></script>
</body>
</html>
